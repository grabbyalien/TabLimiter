<!DOCTYPE html>
<html>
<head>
  <title>Tab Limiter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Tab Limiter</h2>
    <p class="subtitle">Keep your workspace clean.</p>
    
    <div class="input-group">
      <label for="limit">Max Tabs:</label>
      <input type="number" id="limit" min="1" max="999">
    </div>
    
    <button id="save">Save Limit</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
